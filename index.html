<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCB AI Builds — Open marketing tools built with AI</title>
  <link rel="icon" type="image/png" href="/mcb-ai-builds/logos/mcb cases/10.png" />
  <link rel="apple-touch-icon" href="/mcb-ai-builds/logos/mcb cases/10.png" />
  <meta name="description" content="Open marketing tools, skills, prompts, and templates built with AI by Marketing Case Bootcamp." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sora', sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">

  <!-- Header -->
  <header class="w-full bg-white border-b border-gray-200 shadow-sm sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="p-1.5 bg-gradient-to-r from-[#FE602F] to-orange-400 rounded-lg shadow shadow-orange-200">
          <img src="logos/mcb cases/10.png" alt="MCB Logo" class="w-5 h-5 object-contain" />
        </div>
        <span class="font-bold text-[#FE602F]">MCB AI Builds</span>
      </div>
      <a
        href="https://github.com/marketingcasebootcamp/mcb-ai-builds"
        target="_blank"
        class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-900 transition-colors"
      >
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        View on GitHub
      </a>
    </div>
  </header>

  <!-- Hero -->
  <div class="max-w-5xl mx-auto px-4 pt-12 pb-8 text-center">
    <h1 class="text-2xl font-bold tracking-tight text-gray-900">Open marketing tools built with AI</h1>
    <p class="mt-2 text-gray-500 text-sm">Free skills, prompts, apps, and templates for marketers. No setup required for most.</p>
  </div>

  <!-- Controls -->
  <div class="max-w-5xl mx-auto px-4 pb-6 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
    <input
      id="search"
      type="text"
      placeholder="Search modules..."
      class="w-full sm:w-64 px-4 py-2 text-sm border border-gray-200 rounded-lg bg-white focus:outline-none focus:border-gray-400 transition-colors"
    />
    <div id="filters" class="flex flex-wrap gap-2 p-1 bg-gray-100 rounded-xl">
      <button class="filter-btn px-4 py-1.5 rounded-lg text-sm font-semibold transition-colors bg-[#FE602F] text-white" data-filter="all">All</button>
      <button class="filter-btn px-4 py-1.5 rounded-lg text-sm font-semibold transition-colors text-gray-600 hover:bg-gray-200" data-filter="skill">Skills</button>
      <button class="filter-btn px-4 py-1.5 rounded-lg text-sm font-semibold transition-colors text-gray-600 hover:bg-gray-200" data-filter="prompt">Prompts</button>
      <button class="filter-btn px-4 py-1.5 rounded-lg text-sm font-semibold transition-colors text-gray-600 hover:bg-gray-200" data-filter="app">Apps</button>
      <button class="filter-btn px-4 py-1.5 rounded-lg text-sm font-semibold transition-colors text-gray-600 hover:bg-gray-200" data-filter="template">Templates</button>
      <button class="filter-btn px-4 py-1.5 rounded-lg text-sm font-semibold transition-colors text-gray-600 hover:bg-gray-200" data-filter="google-script">Google Scripts</button>
    </div>
  </div>

  <!-- Grid -->
  <div id="grid" class="max-w-5xl mx-auto px-4 pb-20 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  <!-- Footer -->
  <footer class="border-t border-gray-200 bg-white mt-8">
    <div class="max-w-5xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-sm text-gray-400">
      <span>MIT License — free to use, modify, and build on.</span>
      <a href="https://mcb.ai" target="_blank" class="text-[#FE602F] font-semibold hover:opacity-80 transition-opacity">MCB.AI &rarr;</a>
    </div>
  </footer>

<script>
  // ─────────────────────────────────────────────
  // MODULE DATA — add new modules here
  // ─────────────────────────────────────────────
  const REPO = "https://github.com/marketingcasebootcamp/mcb-ai-builds";
  const RAW  = "https://raw.githubusercontent.com/marketingcasebootcamp/mcb-ai-builds/main";

  const modules = [
    {
      name: "Competitor Marketing Profiler",
      slug: "competitor-marketing-profiler",
      type: "skill",
      category: "Competitive analysis",
      platform: "Claude",
      summary: "Head-to-head competitive marketing analysis — positioning, messaging, channels, and opportunities in one structured report.",
      difficulty: "beginner",
      requires_api: false,
      actions: [
        { label: "How to install", type: "link", value: REPO + "/tree/main/skills/competitor-marketing-profiler" },
        { label: "Copy skill", type: "copy", copyUrl: RAW + "/skills/competitor-marketing-profiler/SKILL.md", defaultLabel: "Copy skill" }
      ]
    }
    // ADD MORE MODULES HERE
  ];

  // ─────────────────────────────────────────────
  // CONFIG
  // ─────────────────────────────────────────────
  const TYPE_CONFIG = {
    skill:          { label: "Skill",          bg: "bg-blue-50",   text: "text-blue-700"   },
    prompt:         { label: "Prompt",         bg: "bg-amber-50",  text: "text-amber-700"  },
    app:            { label: "App",            bg: "bg-green-50",  text: "text-green-700"  },
    template:       { label: "Template",       bg: "bg-purple-50", text: "text-purple-700" },
    "google-script":{ label: "Google Script",  bg: "bg-pink-50",   text: "text-pink-700"   },
    agent:          { label: "Agent",          bg: "bg-red-50",    text: "text-red-700"    },
  };

  const DIFF_CONFIG = {
    beginner:     { bg: "bg-green-50",  text: "text-green-700"  },
    intermediate: { bg: "bg-amber-50",  text: "text-amber-700"  },
    advanced:     { bg: "bg-red-50",    text: "text-red-700"    },
  };

  // ─────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────
  let activeFilter = "all";
  let searchQuery  = "";

  // ─────────────────────────────────────────────
  // RENDER
  // ─────────────────────────────────────────────
  function render() {
    const grid = document.getElementById("grid");
    const q = searchQuery.toLowerCase();

    const filtered = modules.filter(m => {
      const matchType   = activeFilter === "all" || m.type === activeFilter;
      const matchSearch = !q ||
        m.name.toLowerCase().includes(q) ||
        m.summary.toLowerCase().includes(q) ||
        (m.category || "").toLowerCase().includes(q) ||
        m.platform.toLowerCase().includes(q);
      return matchType && matchSearch;
    });

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="col-span-full text-center py-20 text-gray-400 text-sm">
          No modules found.
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(m => {
      const tc = TYPE_CONFIG[m.type] || { label: m.type, bg: "bg-gray-100", text: "text-gray-600" };
      const dc = DIFF_CONFIG[m.difficulty] || { bg: "bg-gray-100", text: "text-gray-600" };

      const actionsHtml = m.actions.map(a => {
        if (a.type === "link") {
          return `<a href="${a.value}" target="_blank" class="flex-1 text-center px-3 py-2 text-sm font-semibold border border-gray-200 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors">${a.label}</a>`;
        }
        if (a.type === "copy") {
          return `<button
            class="copy-btn flex-1 px-3 py-2 text-sm font-semibold rounded-lg bg-[#FE602F] text-white hover:opacity-90 transition-opacity"
            data-copy-url="${a.copyUrl}"
            data-default-label="${a.defaultLabel}"
          >${a.label}</button>`;
        }
        return '';
      }).join('');

      return `
        <div class="bg-white border border-gray-200 rounded-xl shadow-sm hover:shadow-md transition-shadow p-5 flex flex-col gap-3">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${tc.bg} ${tc.text}">${tc.label}</span>
            <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${dc.bg} ${dc.text} capitalize">${m.difficulty}</span>
            ${m.requires_api ? '<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-gray-100 text-gray-500">API key needed</span>' : ''}
          </div>
          <div class="font-semibold text-gray-900 leading-snug">${m.name}</div>
          <div class="text-sm text-gray-500 flex-1 leading-relaxed">${m.summary}</div>
          <div class="text-xs text-gray-400">Platform: ${m.platform}</div>
          <div class="flex gap-2 pt-1">${actionsHtml}</div>
        </div>`;
    }).join('');

    // Bind copy buttons
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => handleCopy(btn));
    });
  }

  async function handleCopy(btn) {
    const url          = btn.dataset.copyUrl;
    const defaultLabel = btn.dataset.defaultLabel;
    try {
      const res  = await fetch(url);
      const text = await res.text();
      await navigator.clipboard.writeText(text);
      btn.textContent = "Copied!";
      btn.classList.remove("bg-[#FE602F]");
      btn.classList.add("bg-green-500");
      setTimeout(() => {
        btn.textContent = defaultLabel;
        btn.classList.add("bg-[#FE602F]");
        btn.classList.remove("bg-green-500");
      }, 2000);
    } catch {
      window.open(url, "_blank");
    }
  }

  // ─────────────────────────────────────────────
  // EVENTS
  // ─────────────────────────────────────────────
  document.getElementById("filters").addEventListener("click", e => {
    if (!e.target.matches(".filter-btn")) return;
    activeFilter = e.target.dataset.filter;
    document.querySelectorAll(".filter-btn").forEach(b => {
      b.classList.remove("bg-[#FE602F]", "text-white");
      b.classList.add("text-gray-600");
    });
    e.target.classList.add("bg-[#FE602F]", "text-white");
    e.target.classList.remove("text-gray-600");
    render();
  });

  document.getElementById("search").addEventListener("input", e => {
    searchQuery = e.target.value;
    render();
  });

  render();
</script>
</body>
</html>
